<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单与对账管理系统</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --line: #d9e1ea;
      --line-strong: #c7d2df;
      --head: #edf2f7;
      --text: #1f2d3d;
      --muted: #5f6f82;
      --primary: #0b62c0;
      --danger: #c62828;
      --white: #fff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    .page {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 16px 20px;
    }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      margin: 0 -16px 12px;
    }
    .title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--line-strong);
      background: #f9fbfd;
      color: #2b3a4b;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
    }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .section {
      background: var(--white);
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .section-hd {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--head);
      font-weight: 700;
      font-size: 15px;
    }
    .section-bd {
      padding: 12px;
    }

    .maint-grid {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    .maint-grid .subblock {
      width: 50%;
      min-width: 0;
    }
    .subblock {
      border: 1px solid var(--line);
      background: #fafcff;
    }
    .sub-hd {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      background: #f1f6fb;
      font-size: 13px;
    }
    .sub-hd-with-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .sub-hd-with-btn > button {
      flex-shrink: 0;
    }
    .sub-bd { padding: 10px; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .product-customer-row select {
      flex: 1;
      min-width: 0;
    }
    .product-customer-row button {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .row:last-child { margin-bottom: 0; }
    label {
      min-width: 66px;
      color: var(--muted);
      font-size: 13px;
    }
    input, select, button {
      border: 1px solid var(--line-strong);
      min-height: 32px;
      border-radius: 4px;
      padding: 0 8px;
      font-size: 13px;
      background: #fff;
    }
    input, select { width: 100%; }
    button { cursor: pointer; font-weight: 600; }
    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .btn-light {
      background: #fff;
      color: #2d3d4f;
    }
    .btn-danger {
      background: #fff5f5;
      border-color: #f3caca;
      color: #9f1d1d;
    }
    .btn-mini {
      min-height: 26px;
      padding: 0 8px;
      font-size: 12px;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
    }
    .customer-table-wrap,
    .contract-table-wrap {
      overflow-x: hidden;
    }
    .customer-table-wrap table,
    .contract-table-wrap table {
      min-width: 0;
      table-layout: fixed;
    }
    .customer-table-wrap th,
    .customer-table-wrap td {
      height: 40px;
    }
    .customer-col-index { width: 20%; }
    .customer-col-name { width: 50%; }
    .customer-col-op { width: 30%; }
    .customer-name-cell span {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .product-groups {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-area-hint {
      text-align: center;
      padding: 20px 12px;
    }
    .subblock .sub-bd > .product-groups {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .product-group {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .product-group > summary {
      cursor: pointer;
      padding: 8px 10px;
      background: #f6f9fd;
      font-weight: 700;
      user-select: none;
    }
    .product-group .table-wrap {
      border-left: none;
      border-right: none;
      border-bottom: none;
      border-top: 1px solid var(--line);
    }
    .product-select-list {
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .product-select-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid #eef2f6;
    }
    .product-select-item:last-child {
      border-bottom: none;
    }
    .product-select-meta {
      min-width: 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .product-select-name {
      font-weight: 600;
    }
    .product-select-spec {
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid #eef2f6;
      padding: 8px 8px;
      white-space: nowrap;
      text-align: left;
      font-size: 13px;
    }
    th:last-child, td:last-child { border-right: none; }
    th {
      background: #f3f6fa;
      color: #2f3f50;
      font-weight: 700;
    }
    .right { text-align: right; }
    .center { text-align: center; }
    .muted { color: var(--muted); }
    .danger { color: var(--danger); font-weight: 700; }
    .progress { color: #000; font-weight: 700; }
    .op { display: flex; gap: 6px; }

    .order-form {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }
    .order-form .field small {
      color: var(--muted);
      display: block;
      margin-top: 2px;
      font-size: 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .sum-item {
      border: 1px solid var(--line);
      background: #f9fbfd;
      padding: 10px;
    }
    .sum-item .k { color: var(--muted); font-size: 12px; }
    .sum-item .v { font-size: 17px; font-weight: 700; margin-top: 4px; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 12px;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: min(580px, 100%);
      background: #fff;
      border: 1px solid var(--line);
    }
    .modal-hd {
      background: #f0f4f8;
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }
    .modal-bd { padding: 10px; }
    .modal-ft {
      padding: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .modal-grid .full { grid-column: 1 / -1; }
    .records-table-wrap {
      border: 1px solid var(--line);
      overflow-x: hidden;
    }
    .records-table-wrap table {
      min-width: 0;
      table-layout: fixed;
    }
    .records-table-wrap th,
    .records-table-wrap td {
      height: 38px;
      vertical-align: middle;
    }
    .records-table-wrap td input {
      width: 100%;
      min-height: 28px;
    }

    @media (max-width: 1180px) {
      .maint-grid { flex-direction: column; }
      .maint-grid .subblock { width: 100%; }
      .order-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .order-form { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }

    /* —— 移动端卡片（<768px）—— */
    .mobile-only { display: none !important; }

    .order-item-card-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .order-item-card {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: 0 1px 4px rgba(31, 45, 61, 0.08);
      line-height: 1.65;
    }
    .order-item-card:last-child { margin-bottom: 0; }
    .order-item-card .card-field {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .order-item-card .card-field:last-of-type { margin-bottom: 0; }
    .order-item-card .card-label {
      font-weight: 700;
      color: var(--text);
      flex: 0 0 auto;
      min-width: 4.5em;
    }
    .order-item-card .card-field input {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      min-height: 40px;
    }
    .order-item-card .card-value-num {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .order-item-card .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      justify-content: flex-end;
    }
    .order-item-card .card-actions button {
      min-height: 40px;
      font-size: 14px;
      padding: 0 12px;
    }
    .order-item-card .card-field-total {
      margin-bottom: 0;
    }
    .order-item-card .card-total {
      font-weight: 800;
      font-size: 16px;
      color: #333;
    }
    .add-product-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .add-product-bar button {
      min-height: 40px;
      font-size: 14px;
      padding: 0 12px;
    }

    .detail-product-card {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafcff;
      box-shadow: 0 1px 4px rgba(31, 45, 61, 0.06);
      line-height: 1.65;
      font-size: 14px;
    }
    .detail-product-card:last-child { margin-bottom: 0; }
    .detail-product-card .line {
      margin-bottom: 8px;
    }
    .detail-product-card .line:last-child { margin-bottom: 0; }
    .detail-product-card strong {
      font-weight: 700;
      color: var(--text);
    }

    .shipment-record-card {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafcff;
      box-shadow: 0 1px 4px rgba(31, 45, 61, 0.06);
      line-height: 1.65;
      font-size: 14px;
    }
    .shipment-record-card:last-child { margin-bottom: 0; }
    .shipment-record-card .ship-lines {
      margin-top: 8px;
      padding-left: 0;
    }

    .statement-card-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .statement-card {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: 0 1px 4px rgba(31, 45, 61, 0.08);
      line-height: 1.65;
      font-size: 14px;
    }
    .statement-card:last-child { margin-bottom: 0; }
    .statement-card .stmt-line {
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
    }
    .statement-card .stmt-line:last-child { margin-bottom: 0; }
    .statement-card .stmt-k {
      font-weight: 700;
      color: var(--text);
    }
    .statement-card .stmt-v {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .statement-card .stmt-v--money {
      color: #0b62c0;
      font-size: 15px;
    }

    @media (max-width: 767px) {
      body {
        font-size: 14px;
        line-height: 1.6;
      }
      .desktop-only { display: none !important; }
      .mobile-only { display: block !important; }
      .statement-card-list.mobile-only {
        display: flex !important;
        flex-direction: column;
      }
      label { font-size: 14px; }
      input, select, button { font-size: 14px; }
      .btn-mini {
        font-size: 14px;
        min-height: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1 class="title">订单履约与发货进度管理系统</h1>
      <div class="tabs">
        <button class="tab-btn active" data-tab="ordersPanel">订单管理系统</button>
        <button class="tab-btn" data-tab="statementPanel">对账单</button>
      </div>
    </div>

    <section id="ordersPanel" class="panel active">
    <section class="section">
      <div class="section-hd">客户管理</div>
      <div class="section-bd">
        <form id="createCustomerForm">
          <div class="order-form" style="grid-template-columns:repeat(3,minmax(0,1fr));">
            <div class="field">
              <label>客户名称</label>
              <input id="newCustomerInput" placeholder="请输入客户名称" />
            </div>
            <div class="field">
              <label>联系方式</label>
              <input id="newCustomerContact" placeholder="手机号/微信/邮箱（可选）" />
            </div>
            <div class="field" style="display:flex;align-items:flex-end;">
              <button type="submit" class="btn-primary" style="width:100%;">新增客户</button>
            </div>
          </div>
        </form>
        <div class="table-wrap customer-table-wrap" style="margin-top:10px;">
          <table>
            <thead>
              <tr>
                <th class="center customer-col-index">序号</th>
                <th class="left customer-col-name">客户名称</th>
                <th class="left">联系方式</th>
                <th class="center customer-col-op">操作</th>
              </tr>
            </thead>
            <tbody id="customerTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-hd">新增订单</div>
      <div class="section-bd">
        <form id="createOrderForm">
          <div class="order-form" style="grid-template-columns:repeat(2,minmax(0,1fr));">
            <div class="field">
              <label>选择客户</label>
              <select id="newCustomerSelect">
                <option value="">请先新增客户或选择客户</option>
              </select>
            </div>
            <div class="field">
              <label>合同号</label>
              <input id="newContractNo" placeholder="请输入合同号" />
            </div>
          </div>

          <div class="muted" style="margin-top:10px;">
            提示：可在下方表格中直接录入产品信息
          </div>

          <div id="newOrderItemsHost" style="margin-top:10px;"></div>

          <div style="margin-top:12px;display:flex;justify-content:flex-end;">
            <button type="submit" class="btn-primary">创建订单</button>
          </div>
        </form>
      </div>
    </section>

    <section class="section">
      <div class="section-hd">订单详情</div>
      <div class="section-bd">
        <div id="orderDetailRoot" class="muted">暂无订单<br />请创建订单</div>
      </div>
    </section>
    </section>

    <section id="statementPanel" class="panel">
      <div class="section">
        <div class="section-hd">对账单系统</div>
        <div class="section-bd">
          <div class="row">
            <label>月份</label>
            <input id="statementMonth" type="month" style="max-width:220px;" />
            <button id="queryStatementBtn" class="btn-light" type="button">生成对账单</button>
            <button id="exportExcelBtn" class="btn-primary" type="button">导出Excel</button>
          </div>
          <div id="statementTableWrap" class="desktop-only">
            <div class="table-wrap">
              <table style="min-width:0;table-layout:fixed;">
                <thead>
                  <tr>
                    <th>发货日期</th>
                    <th>送货单号</th>
                    <th>订单号（合同号）</th>
                    <th>品名</th>
                    <th>规格</th>
                    <th class="center">数量</th>
                    <th class="center">单价</th>
                    <th class="right">金额</th>
                  </tr>
                </thead>
                <tbody id="statementTableBody"></tbody>
              </table>
            </div>
          </div>
          <div id="statementCardList" class="statement-card-list mobile-only" aria-label="对账单明细（移动端）"></div>
          <div class="summary">
            <div class="sum-item">
              <div class="k">本月合计数量</div>
              <div id="sumStatementQty" class="v">0 PCS</div>
            </div>
            <div class="sum-item">
              <div class="k">本月合计金额</div>
              <div id="sumStatementAmount" class="v">¥0.00</div>
            </div>
            <div class="sum-item">
              <div class="k">人民币大写金额</div>
              <div id="sumStatementUpper" class="v">零元整</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="shipmentModal" class="modal">
    <div class="modal-box">
      <div class="modal-hd">
        <span>新增发货（可一次录入多个产品）</span>
      </div>
      <div class="modal-bd">
        <div class="modal-grid">
          <div>
            <label>发货日期</label>
            <input id="shipmentDate" type="date" />
          </div>
          <div>
            <label>送货单号</label>
            <input id="shipmentNo" placeholder="请输入送货单号" />
          </div>
        </div>
        <div id="shipmentItemsEditor" style="margin-top:10px;"></div>
      </div>
      <div class="modal-ft">
        <button type="button" id="cancelShipmentBtn" class="btn-light">取消</button>
        <button type="button" id="saveShipmentBtn" class="btn-primary">保存发货</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    const STORAGE_KEY = "order_system_data";
    const SUPABASE_URL = "https://gyatmvavtkhfuaqruxsr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5YXRtdmF2dGtoZnVhcXJ1eHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDQ0MDIsImV4cCI6MjA5MjUyMDQwMn0.ygWL2dkThGYtWXFwLp8FzmaqBRC9RWBJi4nLf9cEDTw";
    const supabaseClient = window.supabase
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const state = {
      orders: [],
      customers: [],
      activeOrderId: "",
      statementRows: []
    };

    const MOBILE_BREAKPOINT = 768;
    function isMobile() {
      return window.innerWidth < MOBILE_BREAKPOINT;
    }

    const el = {
      tabBtns: document.querySelectorAll(".tab-btn"),
      panels: document.querySelectorAll(".panel"),
      createCustomerForm: document.getElementById("createCustomerForm"),
      newCustomerInput: document.getElementById("newCustomerInput"),
      newCustomerContact: document.getElementById("newCustomerContact"),
      customerTableBody: document.getElementById("customerTableBody"),
      createOrderForm: document.getElementById("createOrderForm"),
      newCustomerSelect: document.getElementById("newCustomerSelect"),
      newContractNo: document.getElementById("newContractNo"),
      newOrderItemsHost: document.getElementById("newOrderItemsHost"),
      orderDetailRoot: document.getElementById("orderDetailRoot"),
      shipmentModal: document.getElementById("shipmentModal"),
      shipmentDate: document.getElementById("shipmentDate"),
      shipmentNo: document.getElementById("shipmentNo"),
      shipmentItemsEditor: document.getElementById("shipmentItemsEditor"),
      cancelShipmentBtn: document.getElementById("cancelShipmentBtn"),
      saveShipmentBtn: document.getElementById("saveShipmentBtn"),
      statementMonth: document.getElementById("statementMonth"),
      queryStatementBtn: document.getElementById("queryStatementBtn"),
      exportExcelBtn: document.getElementById("exportExcelBtn"),
      statementTableBody: document.getElementById("statementTableBody"),
      statementCardList: document.getElementById("statementCardList"),
      sumStatementQty: document.getElementById("sumStatementQty"),
      sumStatementAmount: document.getElementById("sumStatementAmount"),
      sumStatementUpper: document.getElementById("sumStatementUpper")
    };

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }
    function safeNumber(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }
    function fmtQty(v) {
      const n = safeNumber(v).toFixed(2);
      return n.endsWith(".00") ? String(parseInt(n, 10)) : n;
    }
    function fmtMoney(v) {
      return safeNumber(v).toFixed(2);
    }
    function fmtMoneyDisplay(v) {
      return safeNumber(v).toLocaleString("zh-CN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function percent(n, d) {
      if (d <= 0) return 0;
      return Math.max(0, Math.min(100, Math.round((n / d) * 100)));
    }
    function today() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }
    function currentMonth() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }
    function normalizeOrder(order) {
      return {
        id: String(order.id || uid()),
        customer_name: String(order.customer_name || ""),
        contract_no: String(order.contract_no || ""),
        created_at: String(order.created_at || new Date().toISOString()),
        status: String(order.status || "pending"),
        order_items: Array.isArray(order.order_items)
          ? order.order_items.map(item => ({
              product_name: String(item.product_name || ""),
              product_spec: String(item.product_spec || ""),
              quantity: safeNumber(item.quantity),
              unit_price: safeNumber(item.unit_price)
            }))
          : [],
        shipments: Array.isArray(order.shipments)
          ? order.shipments.map(shipment => ({
              shipment_id: String(shipment.shipment_id || uid()),
              shipment_no: String(shipment.shipment_no || ""),
              shipped_at: String(shipment.shipped_at || ""),
              items: Array.isArray(shipment.items)
                ? shipment.items.map(item => ({
                    product_name: String(item.product_name || ""),
                    quantity_shipped: safeNumber(item.quantity_shipped)
                  }))
                : []
            }))
          : []
      };
    }
    function normalizeCustomer(customer) {
      return {
        id: String(customer.id || uid()),
        name: String(customer.name || "").trim(),
        contact: String(customer.contact || "").trim(),
        created_at: String(customer.created_at || new Date().toISOString())
      };
    }
    function deriveOrderStatus(order) {
      const items = Array.isArray(order?.order_items) ? order.order_items : [];
      if (!items.length) return "pending";
      const shippedMap = {};
      (Array.isArray(order?.shipments) ? order.shipments : []).forEach(shipment => {
        (Array.isArray(shipment.items) ? shipment.items : []).forEach(item => {
          shippedMap[item.product_name] = safeNumber(shippedMap[item.product_name]) + safeNumber(item.quantity_shipped);
        });
      });
      let hasShipped = false;
      let allDone = true;
      items.forEach(item => {
        const ordered = safeNumber(item.quantity);
        const shipped = Math.min(safeNumber(shippedMap[item.product_name]), ordered);
        if (shipped > 0) hasShipped = true;
        if (shipped < ordered) allDone = false;
      });
      if (allDone) return "done";
      if (hasShipped) return "shipped";
      return "pending";
    }
    function toCloudOrder(order) {
      const products = (order.order_items || [])
        .map(item => String(item.product_name || "").trim())
        .filter(Boolean);
      const totalQty = (order.order_items || []).reduce((sum, item) => sum + safeNumber(item.quantity), 0);
      return {
        order_no: String(order.contract_no || ""),
        customer_id: String(order.customer_name || ""),
        product: products.join(" / "),
        quantity: totalQty,
        status: deriveOrderStatus(order),
        created_at: order.created_at || new Date().toISOString(),
        order_payload: JSON.stringify(normalizeOrder(order))
      };
    }
    function fromCloudOrder(row) {
      const payload = row?.order_payload;
      if (payload) {
        try {
          const parsed = typeof payload === "string" ? JSON.parse(payload) : payload;
          return normalizeOrder(parsed);
        } catch (e) {
          console.warn("order_payload parse failed, fallback to summary row", e);
        }
      }
      return normalizeOrder({
        id: uid(),
        customer_name: String(row?.customer_id || ""),
        contract_no: String(row?.order_no || ""),
        created_at: String(row?.created_at || new Date().toISOString()),
        status: String(row?.status || "pending"),
        order_items: [],
        shipments: []
      });
    }
    function isMissingColumnError(error, columnName) {
      if (!error) return false;
      const text = [
        error.message || "",
        error.details || "",
        error.hint || "",
        error.code || ""
      ].join(" ").toLowerCase();
      return text.includes(String(columnName || "").toLowerCase());
    }
    function formatSupabaseError(error) {
      if (!error) return "unknown";
      return [
        `message: ${error.message || "unknown"}`,
        `code: ${error.code || "n/a"}`,
        `details: ${error.details || "n/a"}`,
        `hint: ${error.hint || "n/a"}`
      ].join("\n");
    }
    async function fetchOrdersFromCloud() {
      if (!supabaseClient) return [];
      let data = null;
      let error = null;
      ({ data, error } = await supabaseClient
        .from("orders")
        .select("order_no, customer_id, product, quantity, status, created_at, order_payload")
        .order("created_at", { ascending: true }));
      // order_payload 列不存在时，自动降级到基础字段同步。
      if (error && isMissingColumnError(error, "order_payload")) {
        ({ data, error } = await supabaseClient
          .from("orders")
          .select("order_no, customer_id, product, quantity, status, created_at")
          .order("created_at", { ascending: true }));
      }
      if (error) {
        console.error("Supabase fetch failed:", error);
        throw error;
      }
      return Array.isArray(data) ? data.map(fromCloudOrder) : [];
    }
    async function upsertOrderToCloud(order) {
      if (!supabaseClient) return;
      let payload = toCloudOrder(order);
      if (!payload.order_no || !payload.customer_id) return;
      let { error } = await supabaseClient
        .from("orders")
        .upsert(payload, { onConflict: "order_no" });
      // order_payload 列不存在时，降级为基础字段同步。
      if (error && isMissingColumnError(error, "order_payload")) {
        const { order_payload, ...fallbackPayload } = payload;
        payload = fallbackPayload;
        ({ error } = await supabaseClient
          .from("orders")
          .upsert(payload, { onConflict: "order_no" }));
      }
      if (error) {
        console.error("Supabase upsert failed:", error);
        throw error;
      }
    }
    async function deleteOrderFromCloud(orderNo) {
      if (!supabaseClient || !orderNo) return;
      const { error } = await supabaseClient
        .from("orders")
        .delete()
        .eq("order_no", orderNo);
      if (error) {
        console.error("Supabase delete failed:", error);
        throw error;
      }
    }
    async function checkSupabaseConnection() {
      if (!supabaseClient) return;
      const { error } = await supabaseClient
        .from("orders")
        .select("order_no")
        .limit(1);
      if (error) {
        console.error("Supabase connection check failed:", error);
        const detail = [
          `message: ${error.message || "unknown"}`,
          `code: ${error.code || "n/a"}`,
          `details: ${error.details || "n/a"}`,
          `hint: ${error.hint || "n/a"}`
        ].join("\n");
        alert(`Supabase 连接失败：\n${detail}`);
      }
    }
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { orders: [], customers: [] };
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.orders)) return { orders: [], customers: [] };
        return {
          orders: parsed.orders.map(normalizeOrder),
          customers: Array.isArray(parsed.customers) ? parsed.customers.map(normalizeCustomer) : []
        };
      } catch (e) {
        return { orders: [], customers: [] };
      }
    }
    function persistData() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          orders: state.orders.map(normalizeOrder),
          customers: state.customers.map(normalizeCustomer)
        })
      );
    }
    function setOrders(updater) {
      const nextOrders = typeof updater === "function" ? updater(state.orders) : updater;
      state.orders = Array.isArray(nextOrders) ? nextOrders.map(normalizeOrder) : [];
      persistData();
    }
    function loadAll() {
      state.orders = loadData().orders;
      const data = loadData();
      state.customers = data.customers;
      if (!state.customers.length) {
        const names = Array.from(new Set(state.orders.map(x => String(x.customer_name || "").trim()).filter(Boolean)));
        state.customers = names.map(name => normalizeCustomer({ name }));
        persistData();
      }
    }
    async function loadAllWithCloudFirst() {
      loadAll();
      if (!supabaseClient) return;
      try {
        const cloudOrders = await fetchOrdersFromCloud();
        if (!cloudOrders.length) return;
        state.orders = cloudOrders.map(normalizeOrder);
        const customerNames = Array.from(
          new Set(state.orders.map(x => String(x.customer_name || "").trim()).filter(Boolean))
        );
        state.customers = customerNames.map(name => normalizeCustomer({ name }));
        persistData();
      } catch (e) {
        console.warn("Cloud-first loading failed, fallback local data", e);
        alert(`云端同步读取失败，当前已回退本地数据：\n${formatSupabaseError(e)}`);
      }
    }

    function upsertCustomer(name, contact = "") {
      const cleanName = String(name || "").trim();
      const cleanContact = String(contact || "").trim();
      if (!cleanName) return null;
      const exists = state.customers.find(c => c.name === cleanName);
      if (exists) {
        if (cleanContact && !exists.contact) {
          state.customers = state.customers.map(c => c.id === exists.id ? { ...c, contact: cleanContact } : c);
          persistData();
          renderCustomerTable();
          renderCustomerSelect();
        }
        return exists.id;
      }
      const customer = normalizeCustomer({ name: cleanName, contact: cleanContact });
      state.customers = [...state.customers, customer];
      persistData();
      renderCustomerTable();
      renderCustomerSelect();
      return customer.id;
    }
    function deleteCustomer(customerId) {
      const target = state.customers.find(c => c.id === customerId);
      if (!target) return;
      const usedByOrders = state.orders.some(order => order.customer_name === target.name);
      if (usedByOrders) {
        alert("该客户已被订单使用，暂不允许删除。");
        return;
      }
      state.customers = state.customers.filter(c => c.id !== customerId);
      persistData();
      renderCustomerTable();
      renderCustomerSelect();
    }

    function getOrder(orderId) {
      return state.orders.find(x => x.id === orderId);
    }
    function getOrderItems(orderId) {
      const order = getOrder(orderId);
      return order && Array.isArray(order.order_items) ? order.order_items : [];
    }
    function getShipments(orderId) {
      const order = getOrder(orderId);
      const rows = order && Array.isArray(order.shipments) ? order.shipments : [];
      return rows.slice().sort((a, b) => (a.shipped_at < b.shipped_at ? 1 : -1));
    }
    function getShippedMap(orderId) {
      const shippedMap = {};
      getShipments(orderId).forEach(shipment => {
        (shipment.items || []).forEach(item => {
          shippedMap[item.product_name] = safeNumber(shippedMap[item.product_name]) + safeNumber(item.quantity_shipped);
        });
      });
      return shippedMap;
    }
    function buildStatementRows(month) {
      const rows = [];
      state.orders.forEach(order => {
        const itemMap = {};
        (order.order_items || []).forEach(item => {
          itemMap[item.product_name] = item;
        });
        (order.shipments || []).forEach(shipment => {
          if (!shipment.shipped_at || !shipment.shipped_at.startsWith(month)) return;
          (shipment.items || []).forEach(entry => {
            const qty = safeNumber(entry.quantity_shipped);
            if (qty <= 0) return;
            const product = itemMap[entry.product_name] || {};
            const unitPrice = safeNumber(product.unit_price);
            rows.push({
              shipped_at: shipment.shipped_at,
              shipment_no: shipment.shipment_no,
              contract_no: order.contract_no,
              product_name: entry.product_name,
              product_spec: product.product_spec || "",
              quantity: qty,
              unit_price: unitPrice,
              amount: qty * unitPrice
            });
          });
        });
      });
      return rows.sort((a, b) => (a.shipped_at > b.shipped_at ? 1 : -1));
    }

    function numberToUpper(amount) {
      const cnNums = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
      const cnIntRadice = ["", "拾", "佰", "仟"];
      const cnIntUnits = ["", "万", "亿", "兆"];
      const cnDecUnits = ["角", "分"];
      const cnIntLast = "元";
      const cnInteger = "整";
      const money = safeNumber(amount);
      if (money === 0) return "零元整";
      if (money < 0 || money > 999999999999.99) return "金额超出范围";
      const parts = money.toFixed(2).split(".");
      const integerNum = parts[0];
      const decimalNum = parts[1];
      let chineseStr = "";
      if (parseInt(integerNum, 10) > 0) {
        let zeroCount = 0;
        for (let i = 0; i < integerNum.length; i++) {
          const n = integerNum.substring(i, i + 1);
          const p = integerNum.length - i - 1;
          const q = Math.floor(p / 4);
          const m = p % 4;
          if (n === "0") {
            zeroCount++;
          } else {
            if (zeroCount > 0) chineseStr += cnNums[0];
            zeroCount = 0;
            chineseStr += cnNums[parseInt(n, 10)] + cnIntRadice[m];
          }
          if (m === 0 && zeroCount < 4) chineseStr += cnIntUnits[q];
        }
        chineseStr += cnIntLast;
      }
      if (decimalNum !== "00") {
        for (let i = 0; i < decimalNum.length; i++) {
          const n = decimalNum.substring(i, i + 1);
          if (n !== "0") chineseStr += cnNums[parseInt(n, 10)] + cnDecUnits[i];
        }
      } else {
        chineseStr += cnInteger;
      }
      return chineseStr;
    }

        const bar = document.createElement("div");
        bar.className = "add-product-bar";
        bar.innerHTML = `<button type="button" class="btn-primary js-add-product">+ 添加产品</button>`;
        host.appendChild(bar);
      } else {
        const tableWrap = document.createElement("div");
        tableWrap.className = "table-wrap";
        tableWrap.innerHTML = `
          <table style="min-width:0;table-layout:fixed;">
            <thead>
              <tr>
                <th class="center" style="width:70px;">序号</th>
                <th class="center">产品名称</th>
                <th class="center">产品详细参数</th>
                <th class="center">数量</th>
                <th class="center">单价</th>
                <th class="center">总价</th>
                <th class="center" style="width:170px;">操作</th>
              </tr>
            </thead>
            <tbody id="newOrderItemsBody"></tbody>
          </table>`;
        host.appendChild(tableWrap);
        const tb = host.querySelector("#newOrderItemsBody");
        list.forEach(r => tb.appendChild(buildOrderItemRowTr(r)));
      }
      renderCreateRows();
    }

    function renderCreateRows() {
      const host = el.newOrderItemsHost;
      if (!host) return;
      const cards = host.querySelectorAll(".js-order-item-card");
      if (cards.length) {
        cards.forEach((card, index) => {
          const idx = card.querySelector(".js-row-index");
          if (idx) idx.textContent = String(index + 1);
          const qty = safeNumber(card.querySelector(".js-item-qty")?.value);
          const price = safeNumber(card.querySelector(".js-item-price")?.value);
          const totalCell = card.querySelector(".js-item-total");
          if (totalCell) totalCell.textContent = fmtMoney(qty * price);
        });
        return;
      }
      const rows = host.querySelectorAll("#newOrderItemsBody tr");
      rows.forEach((row, index) => {
        const idxCell = row.querySelector(".js-row-index");
        if (idxCell) idxCell.textContent = String(index + 1);
        const qty = safeNumber(row.querySelector(".js-item-qty")?.value);
        const price = safeNumber(row.querySelector(".js-item-price")?.value);
        const totalCell = row.querySelector(".js-item-total");
        if (totalCell) totalCell.textContent = fmtMoney(qty * price);
      });
    }

    function addOrderItemRow(name = "", spec = "", qty = "", price = "") {
      const host = el.newOrderItemsHost;
      if (!host) return;
      const row = { product_name: name, product_spec: spec, quantity: qty, unit_price: price };
      const cardList = host.querySelector("#newOrderItemsCards");
      const tbody = host.querySelector("#newOrderItemsBody");
      if (cardList) {
        cardList.appendChild(buildOrderItemCard(row));
      } else if (tbody) {
        tbody.appendChild(buildOrderItemRowTr(row));
      } else {
        renderCreateOrderItems([...collectCreateOrderItems(), row]);
        return;
      }
      renderCreateRows();
    }

    async function saveOrder() {
      const selectedCustomerId = el.newCustomerSelect.value;
      const customer = state.customers.find(c => c.id === selectedCustomerId);
      const customerName = customer ? customer.name : "";
      const contractNo = el.newContractNo.value.trim();
      if (!customerName || !contractNo) {
        alert("请选择客户并填写合同号。");
        return;
      }

      const rows = collectCreateOrderItems();
      const items = rows.map(row => {
        const productName = (row.product_name || "").trim();
        const productSpec = (row.product_spec || "").trim();
        const quantity = safeNumber(row.quantity);
        const unitPrice = safeNumber(row.unit_price);
        return {
          product_name: productName,
          product_spec: productSpec,
          quantity,
          unit_price: unitPrice
        };
      }).filter(item => item.product_name && item.quantity > 0);

      if (!items.length) {
        alert("请至少填写一条有效产品信息。");
        return;
      }

      const orderId = uid();
      const newOrder = {
        id: orderId,
        customer_name: customerName,
        contract_no: contractNo,
        created_at: new Date().toISOString(),
        status: "pending",
        order_items: items,
        shipments: []
      };
      setOrders(prev => [...prev, newOrder]);
      state.activeOrderId = orderId;
      el.createOrderForm.reset();
      renderCustomerSelect();
      renderCreateOrderItems([{ product_name: "", product_spec: "", quantity: "", unit_price: "" }]);
      renderOrderDetail();
      renderStatement(el.statementMonth.value || currentMonth());
      try {
        await upsertOrderToCloud(newOrder);
      } catch (e) {
        alert(`订单已保存到本地，但同步 Supabase 失败：\n${formatSupabaseError(e)}`);
      }
    }

    function renderOrderDetail() {
      const order = getOrder(state.activeOrderId);
      if (!order) {
        el.orderDetailRoot.innerHTML = `<div class="muted">暂无订单<br />请创建订单</div>`;
        return;
      }
      const items = getOrderItems(order.id);
      const shippedMap = getShippedMap(order.id);
      const mobile = isMobile();

      const productRows = items.map(item => {
        const ordered = safeNumber(item.quantity);
        const shipped = Math.min(safeNumber(shippedMap[item.product_name]), ordered);
        const remain = Math.max(0, ordered - shipped);
        const p = percent(shipped, ordered);
        return `
          <tr>
            <td>${esc(item.product_name)}${item.product_spec ? ` / ${esc(item.product_spec)}` : ""}</td>
            <td class="center">${fmtQty(ordered)} PCS</td>
            <td class="center">${fmtQty(shipped)} PCS</td>
            <td class="center">${fmtQty(remain)} PCS</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="flex:1;height:10px;background:#e8eff7;border-radius:999px;overflow:hidden;">
                  <div style="height:100%;width:${p}%;background:#0b62c0;"></div>
                </div>
                <span>${p}%</span>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      const productCards = items.map(item => {
        const ordered = safeNumber(item.quantity);
        const shipped = Math.min(safeNumber(shippedMap[item.product_name]), ordered);
        const remain = Math.max(0, ordered - shipped);
        const p = percent(shipped, ordered);
        const specShow = item.product_spec ? esc(item.product_spec) : "—";
        return `
          <div class="detail-product-card">
            <div class="line"><strong>产品名称：</strong><span>${esc(item.product_name)}</span></div>
            <div class="line"><strong>订单总数量：</strong><span>${fmtQty(ordered)} PCS</span></div>
            <div class="line"><strong>已发数量：</strong><span>${fmtQty(shipped)} PCS</span></div>
            <div class="line"><strong>未发数量：</strong><span>${fmtQty(remain)} PCS</span></div>
            <div class="line"><strong>规格：</strong><span>${specShow}</span></div>
            <div class="line"><strong>发货进度：</strong></div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
              <div style="flex:1;height:10px;background:#e8eff7;border-radius:999px;overflow:hidden;">
                <div style="height:100%;width:${p}%;background:#0b62c0;"></div>
              </div>
              <span>${p}%</span>
            </div>
          </div>
        `;
      }).join("");

      const timeline = getShipments(order.id).map(shipment => {
        const shipmentLines = (shipment.items || [])
          .filter(item => safeNumber(item.quantity_shipped) > 0)
          .map(item => `<div>- ${esc(item.product_name)} × ${fmtQty(item.quantity_shipped)} PCS</div>`)
          .join("");
        if (!shipmentLines) return "";
        return `
          <div class="shipment-record-card">
            <div class="line"><strong>发货时间：</strong>${esc(shipment.shipped_at)}</div>
            <div class="line"><strong>送货单号：</strong>${esc(shipment.shipment_no)}</div>
            <div class="line" style="margin-top:8px;"><strong>发货内容：</strong></div>
            <div class="ship-lines">${shipmentLines}</div>
          </div>
        `;
      }).join("");

      const productBlock = mobile
        ? `<div style="margin-top:10px;">${productCards || `<div class="muted">暂无产品数据</div>`}</div>`
        : `
        <div class="table-wrap" style="margin-top:10px;">
          <table style="min-width:0;table-layout:fixed;">
            <thead>
              <tr>
                <th class="center">产品总览</th>
                <th class="center">订单总数量</th>
                <th class="center">已发数量</th>
                <th class="center">未发数量</th>
                <th class="center">可视化</th>
              </tr>
            </thead>
            <tbody>${productRows || `<tr><td colspan="5" class="muted">暂无产品数据</td></tr>`}</tbody>
          </table>
        </div>
      `;

      el.orderDetailRoot.innerHTML = `
        <div class="row" style="justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
          <div>
            <div><strong>客户名称：</strong>${esc(order.customer_name)}</div>
            <div><strong>合同号：</strong>${esc(order.contract_no)}</div>
            <div><strong>状态：</strong>${esc(deriveOrderStatus(order))}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button id="openShipmentModalBtn" class="btn-primary">新增发货</button>
            <button id="deleteOrderBtn" class="btn-danger">删除订单</button>
          </div>
        </div>

        ${productBlock}

        <div style="margin-top:12px;">
          <div style="font-weight:700;margin-bottom:6px;font-size:15px;">发货记录（时间轴）</div>
          ${timeline || `<div class="muted">暂无发货记录</div>`}
        </div>
      `;
    }

    function openShipmentModal(orderId) {
      const order = getOrder(orderId);
      if (!order) return;
      const items = getOrderItems(orderId);
      const shippedMap = getShippedMap(orderId);
      el.shipmentDate.value = today();
      el.shipmentNo.value = "";
      el.shipmentItemsEditor.innerHTML = items.map(item => {
        const ordered = safeNumber(item.quantity);
        const shipped = Math.min(safeNumber(shippedMap[item.product_name]), ordered);
        const remain = Math.max(0, ordered - shipped);
        return `
          <div class="row">
            <label style="min-width:220px;">${esc(item.product_name)}（剩余 ${fmtQty(remain)} PCS）</label>
            <input
              type="number"
              min="0"
              step="0.01"
              class="js-shipment-item-qty"
              data-product="${esc(item.product_name)}"
              data-remain="${remain}"
              placeholder="本次发货数量"
            />
          </div>
        `;
      }).join("");
      el.shipmentModal.classList.add("show");
    }
    function closeShipmentModal() {
      el.shipmentModal.classList.remove("show");
    }
    async function saveShipment() {
      const orderId = state.activeOrderId;
      const order = getOrder(orderId);
      if (!order) return;
      const shippedAt = el.shipmentDate.value;
      const shipmentNo = el.shipmentNo.value.trim();
      if (!shippedAt || !shipmentNo) {
        alert("请填写发货日期和送货单号。");
        return;
      }

      const entries = Array.from(el.shipmentItemsEditor.querySelectorAll(".js-shipment-item-qty"))
        .map(input => ({
          product_name: input.getAttribute("data-product") || "",
          quantity_shipped: safeNumber(input.value),
          remain: safeNumber(input.getAttribute("data-remain"))
        }))
        .filter(x => x.quantity_shipped > 0);

      if (!entries.length) {
        alert("请至少填写一个产品的发货数量。");
        return;
      }

      const orderItemNames = new Set(getOrderItems(orderId).map(x => x.product_name));
      for (const entry of entries) {
        if (!orderItemNames.has(entry.product_name)) {
          alert(`发货产品 ${entry.product_name} 不在订单中。`);
          return;
        }
        if (entry.quantity_shipped > entry.remain) {
          alert(`${entry.product_name} 发货数量不能超过剩余数量 ${fmtQty(entry.remain)} PCS。`);
          return;
        }
      }

      const newShipment = {
        shipment_id: uid(),
        shipment_no: shipmentNo,
        shipped_at: shippedAt,
        items: entries.map(entry => ({
          product_name: entry.product_name,
          quantity_shipped: entry.quantity_shipped
        }))
      };
      setOrders(prev =>
        prev.map(row =>
          row.id === orderId
            ? {
                ...row,
                shipments: [...(Array.isArray(row.shipments) ? row.shipments : []) , newShipment],
                status: deriveOrderStatus({
                  ...row,
                  shipments: [...(Array.isArray(row.shipments) ? row.shipments : []), newShipment]
                })
              }
            : row
        )
      );
      closeShipmentModal();
      renderOrderDetail();
      renderStatement(el.statementMonth.value || currentMonth());
      try {
        const latest = getOrder(orderId);
        if (latest) await upsertOrderToCloud(latest);
      } catch (e) {
        alert(`发货已保存到本地，但同步 Supabase 失败：\n${formatSupabaseError(e)}`);
      }
    }
    async function deleteActiveOrder() {
      const orderId = state.activeOrderId;
      if (!orderId) return;
      if (!confirm("删除后无法恢复，是否确认删除该订单？")) return;
      const targetOrder = getOrder(orderId);
      setOrders(prev => prev.filter(order => order.id !== orderId));
      state.activeOrderId = state.orders.length ? state.orders[state.orders.length - 1].id : "";
      renderOrderDetail();
      renderStatement(el.statementMonth.value || currentMonth());
      try {
        await deleteOrderFromCloud(targetOrder?.contract_no || "");
      } catch (e) {
        alert(`本地删除成功，但 Supabase 删除失败：\n${formatSupabaseError(e)}`);
      }
    }

    function bindEvents() {
      el.tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          el.tabBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const tabId = btn.getAttribute("data-tab");
          el.panels.forEach(panel => panel.classList.remove("active"));
          document.getElementById(tabId).classList.add("active");
        });
      });
      el.newOrderItemsHost.addEventListener("click", (e) => {
        const addProductBtn = e.target.closest(".js-add-product");
        if (addProductBtn) {
          addOrderItemRow();
          return;
        }
        const addBtn = e.target.closest(".js-add-next-row");
        if (addBtn) {
          addOrderItemRow();
          return;
        }
        const delBtn = e.target.closest(".js-remove-item");
        if (!delBtn) return;
        const row = delBtn.closest("tr");
        const card = delBtn.closest(".js-order-item-card");
        if (row) row.remove();
        else if (card) card.remove();
        const host = el.newOrderItemsHost;
        const hasAny = host.querySelector("#newOrderItemsBody tr, .js-order-item-card");
        if (!hasAny) addOrderItemRow();
        renderCreateRows();
      });
      el.newOrderItemsHost.addEventListener("input", () => {
        renderCreateRows();
      });
      el.createOrderForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        await saveOrder();
      });
      el.createCustomerForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = el.newCustomerInput.value.trim();
        const contact = el.newCustomerContact.value.trim();
        if (!name) {
          alert("请输入客户名称。");
          return;
        }
        const id = upsertCustomer(name, contact);
        if (id) {
          el.newCustomerSelect.value = id;
          el.createCustomerForm.reset();
        }
      });
      el.customerTableBody.addEventListener("click", (e) => {
        const delBtn = e.target.closest(".js-delete-customer");
        if (!delBtn) return;
        const customerId = delBtn.getAttribute("data-customer-id");
        if (!customerId) return;
        if (!confirm("确认删除该客户？")) return;
        deleteCustomer(customerId);
      });

      el.orderDetailRoot.addEventListener("click", (e) => {
        const shipBtn = e.target.closest("#openShipmentModalBtn");
        if (shipBtn && state.activeOrderId) {
          openShipmentModal(state.activeOrderId);
          return;
        }
        const deleteBtn = e.target.closest("#deleteOrderBtn");
        if (deleteBtn) {
          deleteActiveOrder();
        }
      });

      el.cancelShipmentBtn.addEventListener("click", closeShipmentModal);
      el.shipmentModal.addEventListener("click", (e) => {
        if (e.target === el.shipmentModal) closeShipmentModal();
      });
      el.saveShipmentBtn.addEventListener("click", async () => {
        await saveShipment();
      });
      el.queryStatementBtn.addEventListener("click", () => {
        if (!el.statementMonth.value) {
          alert("请选择月份。");
          return;
        }
        renderStatement(el.statementMonth.value);
      });
      el.exportExcelBtn.addEventListener("click", exportStatementExcel);
    }

    let layoutMobile = isMobile();
    function onLayoutMaybeChange() {
      const now = isMobile();
      if (now === layoutMobile) return;
      layoutMobile = now;
      const draft = collectCreateOrderItems();
      renderCreateOrderItems(draft.length ? draft : [{ product_name: "", product_spec: "", quantity: "", unit_price: "" }]);
      renderOrderDetail();
      renderStatement(el.statementMonth.value || currentMonth());
    }

    async function init() {
      await loadAllWithCloudFirst();
      bindEvents();
      renderCustomerTable();
      renderCustomerSelect();
      renderCreateOrderItems([{ product_name: "", product_spec: "", quantity: "", unit_price: "" }]);
      state.activeOrderId = state.orders.length ? state.orders[state.orders.length - 1].id : "";
      el.statementMonth.value = currentMonth();
      renderOrderDetail();
      renderStatement(el.statementMonth.value);
      layoutMobile = isMobile();
      window.addEventListener("resize", () => {
        clearTimeout(window.__orderLayoutResizeT);
        window.__orderLayoutResizeT = setTimeout(onLayoutMaybeChange, 150);
      });
      await checkSupabaseConnection();
    }
    init();
  </script>
</body>
</html>
