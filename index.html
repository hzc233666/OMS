<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单管理系统</title>
  <style>
    :root{--bg:#f4f6fa;--card:#fff;--line:#e5e9f2;--text:#1f2d3d;--muted:#6b7a90;--p:#1677ff;--p2:#e8f3ff;--d:#d4380d;--d2:#fff2f0;--s:#f2f4f8}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}
    .hidden{display:none!important}
    .auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px}
    .auth-card h2{margin:0 0 14px;font-size:22px}
    .field{margin-bottom:12px}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
    input,select,button{width:100%;min-height:36px;border:1px solid #cfd6e3;border-radius:8px;padding:0 10px;background:#fff;font-size:14px}
    button{cursor:pointer;font-weight:600}
    .row{display:flex;gap:8px}.btn-p{background:var(--p);border-color:var(--p);color:#fff}.btn-s{background:var(--s)}.btn-d{background:var(--d2);border-color:#ffccc7;color:var(--d)}
    .msg{margin-top:8px;font-size:13px;color:var(--muted);white-space:pre-line}
    .layout{min-height:100vh;display:grid;grid-template-columns:220px 1fr}
    aside{background:#0f172a;color:#d7e0ee;padding:18px 12px}
    .brand{font-weight:700;color:#fff;margin:0 8px 16px}
    .menu{width:100%;text-align:left;background:transparent;color:#d7e0ee;border:1px solid transparent;border-radius:8px;min-height:40px;padding:0 10px;margin-bottom:8px}
    .menu.active{background:#1e293b;border-color:#334155;color:#fff}
    main{padding:18px 20px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .top h1{margin:0;font-size:22px}.muted{color:var(--muted)}
    .card{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
    .hd{padding:12px 14px;border-bottom:1px solid var(--line);background:#fafbff;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .bd{padding:14px}
    .btn-mini{width:auto;min-height:30px;padding:0 8px;font-size:12px}
    .order-items-table{table-layout:fixed;width:100%;min-width:0}
    .order-items-table th,.order-items-table td{text-align:center!important;vertical-align:middle}
    .order-items-table .col-name{width:22%}
    .order-items-table .col-spec{width:22%}
    .order-items-table .col-qty{width:14%}
    .order-items-table .col-price{width:18%}
    .order-items-table .col-total{width:14%}
    .order-items-table .col-op{width:10%}
    .order-items-table .i-total{white-space:nowrap}
    .order-items-table .i-total .ellipsis{display:inline-block;max-width:10ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .order-items-table input{text-align:center}
    .wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:840px}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;font-size:13px;white-space:nowrap;text-align:left}
    th{background:#f8faff;color:#384861}
    tr:hover td{background:#f8fbff}
    .center{text-align:center}.right{text-align:right}
    .tag{display:inline-flex;border-radius:999px;padding:2px 10px;font-size:12px}
    .t-pending{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .t-shipped{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .t-done{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .progress{display:flex;align-items:center;gap:8px}
    .bar{height:8px;background:#ecf0f7;border-radius:999px;overflow:hidden;min-width:100px}
    .bar span{display:block;height:100%;background:var(--p)}
    .detail{display:grid;grid-template-columns:1fr 220px;gap:14px}
    .inline-detail-row td{background:#fff!important;padding:0;border-bottom:1px solid var(--line)}
    .inline-detail-box{
      margin:12px;
      padding:16px;
      border:1px solid #dbe3ef;
      border-radius:12px;
      background:#f8f9fa;
    }
    .inline-detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .inline-section{
      border:1px solid #e1e8f2;
      border-radius:10px;
      background:#fff;
      padding:12px;
      margin-top:12px;
    }
    .inline-section h4{margin:0 0 10px;font-size:14px}
    .inline-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .edit-input {
      width: 100%;
      min-width: 80px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
    }
    .edit-textarea {
      width: 100%;
      min-width: 120px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      resize: vertical;
    }
    .sticky{position:sticky;top:18px;display:flex;flex-direction:column;gap:8px}
    .sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .sum .cell{border:1px solid var(--line);background:#f9fbff;border-radius:8px;padding:10px}
    .sum .k{font-size:12px;color:var(--muted)}.sum .v{font-size:18px;font-weight:700;margin-top:4px}
    .timeline{border-left:2px solid #d7e3f7;margin-left:10px;padding-left:12px;margin-bottom:12px;position:relative}
    .timeline:before{content:"";position:absolute;left:-7px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--p)}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.45);padding:14px;z-index:99}
    .modal.show{display:flex}.box{width:min(920px,100%);max-height:92vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px}
    .mhd{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;background:#fafbff}
    .mbd{padding:14px}.mft{padding:12px 14px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}aside{display:flex;gap:8px;padding:10px}.brand{margin:0}.menu{width:auto;min-height:34px;margin:0}.detail{grid-template-columns:1fr}.sticky{position:static;flex-direction:row;flex-wrap:wrap}.sum{grid-template-columns:1fr}.inline-detail-grid{grid-template-columns:1fr}}
    @media (max-width:768px){
      aside{display:none!important}
      main{padding:10px}
      .top{margin-bottom:10px;gap:8px;align-items:flex-start}
      .top h1{font-size:22px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw}
      .top .row{min-width:0;display:flex;align-items:center;justify-content:flex-end}
      #u{display:inline-block;max-width:44vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    }
  </style>
</head>
<body>
  <div id="auth" class="auth">
    <div class="auth-card">
      <h2>订单管理系统</h2>
      <div class="field"><label>邮箱</label><input id="email" type="email" /></div>
      <div class="field"><label>密码</label><input id="pwd" type="password" /></div>
      <div class="row"><button id="login" class="btn-p" type="button">登录</button><button id="reg" class="btn-s" type="button">注册</button></div>
      <div id="msg" class="msg">请先登录后使用系统。</div>
    </div>
  </div>

  <div id="app" class="layout hidden">
    <aside>
      <div class="brand">ERP 订单系统</div>
      <button class="menu active" data-v="customers">客户管理</button>
      <button class="menu" data-v="orders">订单管理</button>
      <button class="menu" data-v="statement">对账中心</button>
    </aside>
    <main>
      <div class="top">
        <h1 id="title">客户管理</h1>
        <div class="row" style="align-items:center"><span id="u" class="muted">未登录</span><button id="logout" class="btn-s btn-mini" type="button">退出</button></div>
      </div>
      <div id="ordersView"></div>
      <div id="customersView" class="hidden"></div>
      <div id="statementView" class="hidden"></div>
    </main>
  </div>

  <div id="orderModal" class="modal"><div class="box">
    <div class="mhd"><strong id="orderModalTitle">新建订单</strong><button id="closeOrderModal" class="btn-s btn-mini" type="button">关闭</button></div>
    <form id="orderForm">
      <div class="mbd">
        <div class="field"><label>客户</label><select id="orderCustomer"></select></div>
        <div class="field"><label>合同号</label><input id="orderNo" /></div>
        <div class="field"><label>产品明细</label><div id="itemsEditor"></div><button id="addItem" class="btn-s btn-mini" type="button" style="margin-top:8px">+ 添加产品</button></div>
      </div>
      <div class="mft"><button id="cancelOrder" class="btn-s" type="button">取消</button><button class="btn-p" type="submit">保存订单</button></div>
    </form>
  </div></div>

  <div id="customerModal" class="modal"><div class="box" style="width:min(560px,100%)">
    <div class="mhd"><strong>新建客户</strong><button id="closeCustomerModal" class="btn-s btn-mini" type="button">关闭</button></div>
    <form id="customerForm"><div class="mbd">
      <div class="field"><label>客户名称 *</label><input id="customerName" /></div>
      <div class="field"><label>客户联系人</label><input id="customerContactPerson" /></div>
      <div class="field"><label>联系电话</label><input id="customerPhone" /></div>
      <div class="field"><label>电子邮箱</label><input id="customerEmail" type="email" /></div>
      <div class="field"><label>地址信息</label><input id="customerAddress" /></div>
      <div class="field"><label>税号/统一社会信用代码</label><input id="customerTaxId" /></div>
      <div class="field"><label>备注</label><textarea id="customerRemark" rows="2" style="width:100%"></textarea></div>
    </div><div class="mft"><button id="cancelCustomer" class="btn-s" type="button">取消</button><button class="btn-p" type="submit">保存客户</button></div></form>
  </div></div>

  <div id="shipModal" class="modal"><div class="box" style="width:min(680px,100%)">
    <div class="mhd"><strong>新增发货</strong><button id="closeShipModal" class="btn-s btn-mini" type="button">关闭</button></div>
    <div class="mbd">
      <div class="row">
        <div class="field" style="flex:1"><label>发货日期</label><input id="shipDate" type="date" /></div>
        <div class="field" style="flex:1"><label>送货单号</label><input id="shipNo" /></div>
      </div>
      <div id="shipItems"></div>
      <button id="addShipItem" class="btn-s btn-mini" type="button" style="margin-top:8px">+ 添加下一项</button>
    </div>
    <div class="mft"><button id="cancelShip" class="btn-s" type="button">取消</button><button id="saveShip" class="btn-p" type="button">保存发货</button></div>
  </div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./api.js"></script>
  <script>
    const Api = window.ApiService;
    if (!Api) {
      alert("系统初始化失败：未加载到 api.js（Supabase 接口层）。请确认已部署 index.html 和 api.js。");
      throw new Error("ApiService not found");
    }
    const st = {
      view:"customers",
      orders:[],
      customers:[],
      selected:"",
      editing:"",
      shipOrder:"",
      statementMonth:"",
      statementRows:[],
      expandedOrders:{},
      returnState:null,
      editingCustomerId:null,
      customerEditFormData:{},
      appState:{ tab:"orders", page:"orders/list", params:{} },
      createDraft:{ customerId:"", contractNo:"", items:[{product_name:"",product_spec:"",quantity:"",unit_price:""}] },
      shipDraft:{ orderId:"", shipped_at:"", shipment_no:"", items:[{product_name:"", quantity_shipped:""}] }
    };
    const $ = id => document.getElementById(id);
    const E = {
      auth:$("auth"), app:$("app"), email:$("email"), pwd:$("pwd"), login:$("login"), reg:$("reg"), msg:$("msg"),
      logout:$("logout"), u:$("u"), title:$("title"), menus:document.querySelectorAll(".menu"),
      ordersView:$("ordersView"), customersView:$("customersView"), statementView:$("statementView"),
      orderModal:$("orderModal"), orderModalTitle:$("orderModalTitle"), closeOrderModal:$("closeOrderModal"), cancelOrder:$("cancelOrder"),
      orderForm:$("orderForm"), orderCustomer:$("orderCustomer"), orderNo:$("orderNo"), itemsEditor:$("itemsEditor"), addItem:$("addItem"),
      customerModal:$("customerModal"), closeCustomerModal:$("closeCustomerModal"), cancelCustomer:$("cancelCustomer"),
      customerForm:$("customerForm"), customerName:$("customerName"), customerContactPerson:$("customerContactPerson"), customerPhone:$("customerPhone"), customerEmail:$("customerEmail"), customerAddress:$("customerAddress"), customerTaxId:$("customerTaxId"), customerRemark:$("customerRemark"),
      shipModal:$("shipModal"), closeShipModal:$("closeShipModal"), cancelShip:$("cancelShip"), shipDate:$("shipDate"), shipNo:$("shipNo"),
      shipItems:$("shipItems"), addShipItem:$("addShipItem"), saveShip:$("saveShip")
    };
    const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    const n = v => Api.safeNumber(v);
    const fmtQ = v => { const x=n(v).toFixed(2); return x.endsWith(".00")?String(parseInt(x,10)):x; };
    const fmtM = v => n(v).toFixed(2);
    const md = v => n(v).toLocaleString("zh-CN",{minimumFractionDigits:2,maximumFractionDigits:2});
    const month = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
    const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
    const isMobile = () => window.matchMedia("(max-width: 768px)").matches;
    const tagText = s => s==="done"?"已完成":(s==="shipped"?"进行中":"待发货");
    const tagCls = s => s==="done"?"t-done":(s==="shipped"?"t-shipped":"t-pending");
    const ord = id => st.orders.find(o=>o.id===id);
    const items = id => (ord(id)?.order_items)||[];
    const ships = id => ([...(ord(id)?.shipments||[])].sort((a,b)=>a.shipped_at<b.shipped_at?1:-1));
    const shippedMap = id => { const m={}; ships(id).forEach(s=>(s.items||[]).forEach(i=>m[i.product_name]=n(m[i.product_name])+n(i.quantity_shipped))); return m; };
    const progress = o => { const map=shippedMap(o.id); const t=(o.order_items||[]).reduce((s,i)=>s+n(i.quantity),0); const sh=(o.order_items||[]).reduce((s,i)=>s+Math.min(n(i.quantity),n(map[i.product_name])),0); const p=t>0?Math.max(0,Math.min(100,Math.round(sh/t*100))):0; return {t,sh,p}; };
    function setMsg(t,e=false){E.msg.textContent=t||"";E.msg.style.color=e?"var(--d)":"var(--muted)";}
    function toggleAuth(sess){const ok=!!sess?.user;E.auth.classList.toggle("hidden",ok);E.app.classList.toggle("hidden",!ok);E.u.textContent=ok?`已登录：${sess.user.email||sess.user.id}`:"未登录";}
    function captureReturnState(){st.returnState={view:st.view,selected:st.selected,expandedOrders:{...st.expandedOrders},appState:{...st.appState,params:{...(st.appState?.params||{})}}};}
    function restoreReturnState(opt={}){if(!st.returnState)return;const rs=st.returnState;st.view=rs.view;st.selected=rs.selected;st.expandedOrders={...rs.expandedOrders};st.appState={...rs.appState,params:{...(rs.appState?.params||{})}};if(opt.keepOrderId){st.selected=opt.keepOrderId;st.expandedOrders[opt.keepOrderId]=true;st.appState={tab:"orders",page:"orders/detail",params:{orderId:opt.keepOrderId}};}st.returnState=null;}

    function renderItemsEditor(list){
      const rows = (Array.isArray(list)&&list.length?list:[{product_name:"",product_spec:"",quantity:"",unit_price:""}]).map(i=>`
        <tr><td><input class="i-name" value="${esc(i.product_name||"")}"></td><td><input class="i-spec" value="${esc(i.product_spec||"")}"></td><td><input class="i-qty" type="number" min="0.01" step="0.01" value="${esc(i.quantity||"")}"></td><td><input class="i-price" type="number" min="0" step="0.0001" value="${esc(i.unit_price||"")}"></td><td class="i-total"><span class="ellipsis" title="0.00">0.00</span></td><td class="center"><button class="btn-d btn-mini rm-item" type="button">删除</button></td></tr>
      `).join("");
      E.itemsEditor.innerHTML = `<div class="wrap"><table class="order-items-table"><colgroup><col class="col-name"><col class="col-spec"><col class="col-qty"><col class="col-price"><col class="col-total"><col class="col-op"></colgroup><thead><tr><th>产品名称</th><th>规格</th><th>数量</th><th>单价</th><th>总价</th><th>操作</th></tr></thead><tbody id="itb">${rows}</tbody></table></div>`;
      calcItemTotals();
    }
    function calcItemTotals(){E.itemsEditor.querySelectorAll("#itb tr").forEach(tr=>{const q=n(tr.querySelector(".i-qty")?.value),p=n(tr.querySelector(".i-price")?.value);const t=tr.querySelector(".i-total"); if(t){const val=fmtM(q*p);t.innerHTML=`<span class="ellipsis" title="${esc(val)}">${esc(val)}</span>`;}});}
    function addItemRow(){const tb=E.itemsEditor.querySelector("#itb"); if(!tb) return; tb.insertAdjacentHTML("beforeend",`<tr><td><input class="i-name"></td><td><input class="i-spec"></td><td><input class="i-qty" type="number" min="0.01" step="0.01"></td><td><input class="i-price" type="number" min="0" step="0.0001"></td><td class="i-total"><span class="ellipsis" title="0.00">0.00</span></td><td class="center"><button class="btn-d btn-mini rm-item" type="button">删除</button></td></tr>`);}
    function collectItems(){return [...E.itemsEditor.querySelectorAll("#itb tr")].map(tr=>({product_name:(tr.querySelector(".i-name")?.value||"").trim(),product_spec:(tr.querySelector(".i-spec")?.value||"").trim(),quantity:n(tr.querySelector(".i-qty")?.value),unit_price:n(tr.querySelector(".i-price")?.value)})).filter(i=>i.product_name&&i.quantity>0);}
    function renderCustomerOptions(sel=""){E.orderCustomer.innerHTML=`<option value="">请选择客户</option>`+st.customers.map(c=>`<option value="${esc(c.id)}" ${c.id===sel?"selected":""}>${esc(c.name)}</option>`).join("");}
    function openOrderModal(o){captureReturnState();st.editing=o?o.id:"";E.orderModalTitle.textContent=o?"编辑订单":"新建订单";renderCustomerOptions(o?(st.customers.find(c=>c.name===o.customer_name)?.id||""):"");E.orderNo.value=o?o.contract_no:"";renderItemsEditor(o?o.order_items:null);E.orderModal.classList.add("show");}
    function closeOrderModal(restore=true){E.orderModal.classList.remove("show");st.editing="";E.orderForm.reset();E.itemsEditor.innerHTML="";if(restore){restoreReturnState();render();}}
    function openCustomerModal(){captureReturnState();E.customerModal.classList.add("show")} function closeCustomerModal(restore=true){E.customerModal.classList.remove("show");E.customerForm.reset();if(restore){restoreReturnState();render();}}
    function shipRow(orderId,sel=""){const opts=items(orderId).map(i=>{const nm=String(i.product_name||"").trim();return `<option value="${esc(nm)}" ${sel===nm?"selected":""}>${esc(nm)}</option>`}).join("");return `<div class="row js-sr" style="margin-bottom:8px"><select class="s-name"><option value="">请选择产品</option>${opts}</select><input class="s-qty" type="number" min="0.01" step="0.01" placeholder="发货数量"><button class="btn-d btn-mini rm-sr" type="button">删除</button></div>`;}
    function openShipModal(orderId){captureReturnState();st.shipOrder=orderId;E.shipDate.value=today();E.shipNo.value="";E.shipItems.innerHTML=shipRow(orderId);E.shipModal.classList.add("show");}
    function closeShipModal(restore=true){E.shipModal.classList.remove("show");st.shipOrder="";if(restore){restoreReturnState();render();}}

    function InlineOrderDetail(o){
      const s=Api.deriveOrderStatus(o),p=progress(o),map=shippedMap(o.id);
      const rows=(o.order_items||[]).map(i=>{const q=n(i.quantity),pr=n(i.unit_price),sh=Math.min(q,n(map[i.product_name])),rm=Math.max(0,q-sh);return `<tr><td>${esc(i.product_name)}</td><td class="right">${esc(i.product_spec||"—")}</td><td class="right">${fmtQ(q)}</td><td class="right">${md(pr)}</td><td class="right">${md(q*pr)}</td><td class="right">${fmtQ(sh)}</td><td class="right">${fmtQ(rm)}</td></tr>`}).join("");
      const tl=ships(o.id).map(s=>`<div class="timeline"><div><strong>${esc(s.shipped_at)}</strong> · 单号 ${esc(s.shipment_no)}</div><div class="muted" style="margin-top:4px">${(s.items||[]).map(i=>`<div>- ${esc(i.product_name)} × ${fmtQ(i.quantity_shipped)}</div>`).join("")||"无明细"}</div></div>`).join("");
      return `
        <div class="inline-detail-box">
          <div class="inline-detail-grid">
            <div class="cell"><div class="k">客户</div><div class="v" style="font-size:16px">${esc(o.customer_name)}</div></div>
            <div class="cell"><div class="k">合同号</div><div class="v" style="font-size:16px">${esc(o.contract_no)}</div></div>
            <div class="cell"><div class="k">状态</div><div class="v" style="font-size:16px"><span class="tag ${tagCls(s)}">${tagText(s)}</span></div></div>
          </div>
          <div class="inline-section">
            <h4>产品明细</h4>
            <div class="wrap">
              <table>
                <thead><tr><th>名称</th><th class="right">规格</th><th class="right">数量</th><th class="right">单价</th><th class="right">总价</th><th class="right">已发货</th><th class="right">未发货</th></tr></thead>
                <tbody>${rows||`<tr><td colspan="7" class="center muted">暂无产品明细</td></tr>`}</tbody>
              </table>

    async function saveShipFromPage(orderId){
      const o=ord(orderId);
      if(!o)return;
      const shipDate=(document.getElementById("shipDatePage")?.value||"").trim();
      const shipNo=(document.getElementById("shipNoPage")?.value||"").trim();
      if(!shipDate||!shipNo){alert("请填写发货日期和送货单号。");return;}
      const map=shippedMap(o.id);
      const shipItems=(o.order_items||[]).map((it,idx)=>({product_name:it.product_name,quantity_shipped:n(st.shipDraft.items[idx]?.quantity_shipped)})).filter(i=>i.quantity_shipped>0);
      if(!shipItems.length){alert("请至少填写一条发货明细。");return;}
      for(const item of shipItems){
        const ordItem=(o.order_items||[]).find(i=>i.product_name===item.product_name);
        const ordered=n(ordItem?.quantity);
        const already=Math.min(ordered,n(map[item.product_name]));
        const remain=Math.max(0,ordered-already);
        if(item.quantity_shipped>remain){alert(`${item.product_name} 发货数量不能超过剩余 ${fmtQ(remain)}。`);return;}
      }
      const ship={shipment_id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),shipment_no:shipNo,shipped_at:shipDate,items:shipItems};
      try{
        await Api.createShipment(o,ship,st.customers);
        st.shipDraft={orderId:"", shipped_at:"", shipment_no:"", items:[{product_name:"", quantity_shipped:""}]};
        goTo("ship","ship/list");
        await refresh();
      }catch(err){
        alert(`发货保存失败：\n${Api.formatSupabaseError(err)}`);
      }
    }

      window.addEventListener("resize",()=>render());
    }
    async function initForSession(sess){toggleAuth(sess);if(!sess)return;try{await Api.checkConnection()}catch(err){alert(`Supabase 连接失败：\n${Api.formatSupabaseError(err)}`)}await refresh()}
    async function init(){bind();st.statementMonth=month();const sess=await Api.getSession();await initForSession(sess);Api.onAuthStateChange(async s=>{toggleAuth(s);if(s)await refresh()});Api.subscribeCloudChanges(async()=>{if(E.app.classList.contains("hidden"))return;await refresh()})}
    init();
  </script>
</body>
